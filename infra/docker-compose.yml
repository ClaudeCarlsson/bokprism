services:
  bokprism-app:
    build:
      context: ..
      target: production
    restart: unless-stopped
    networks:
      - web
    expose:
      - "3000"
    volumes:
      - ../data/bokprism.db:/app/data/bokprism.db:ro
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  web:
    external: true
